name: DevOps CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Docker
      run: docker --version

    - name: Build Docker Image
      run: docker build -t monitoring-app ./app

    - name: Run Container Test
      run: docker run -d -p 5000:5000 monitoring-app

    - name: Verify Container Running
      run: docker ps
